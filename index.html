<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestellapp</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./style/standard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Palanquin:wght@100;200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body onload="render()">
    <header>
      <section class="header-content">
        <img
          src="./assets/icons/bestell_logo.svg"
          alt="BestellApp Logo"
          class="logo"
        />
        <nav>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </nav>
      </section>
      <section class="header_intro">
      <img src="./assets/img/header.jpg" class="header" />
      <img src="./assets/icons/logo_burger.png" class="burgerhouse-icon" />
    </section>
    </header>

    <main>
      <section class="rest_info wrapper">
        <div class="title_section">
          <h1><span class="orange">Burger</span>House</h1>
          <div class="reviews">
            <img src="./assets/icons/star.svg" class="star" />
            <p><strong>4,1</strong> (317)</p>
          </div>
        </div>

        <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
      </section>
      <div class="headline_section">
        <img src="./assets/icons/Chanese 1.svg" class="headline_icon" />
        <h2>Burger & Sandwiches</h2>
    </div>
<section class="wrapper">
<section id="menu">
      </section>
      <section id="basket">
        <h3>Your Basket</h3>
             <div id="item-basket"></div>
        <button id="buy_items" popovertarget="my_modal" onclick="clearBasket()">Buy now</button>
      <p>Subtotal</p>
      <p>Delivery fee</p>
      <h3>Total</h3>

      <div id="my_modal" popover>
       <img src="./assets/icons/delivery.png" class="truck" alt="Besttellung aufgegeben icon">
        <p><strong>Order confirmed!</strong><br>
        Your food is on the way!</p>
      </div>
      </section>
    
      </section>
      <div class="headline_section">
        <img src="./assets/icons/Pizza 1.svg" class="headline_icon" />
        <h2>Pizza</h2></div>
        <section class="wrapper">
        <section id="pizza_menu">
        </section>
      </section>
    </section>
    </main>
    <footer>
      <p>&#169; 2025 BurgerHouse</p>
      <p>Imprint</p>
      <p>Cookie Preferences</p>
    </footer>
    <script src="./scripts/template.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
